<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Financiera Efectiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-vh { min-height: 100vh; }
        .bg-login-image {
            background-image: url('https://images.unsplash.com/photo-1573164713988-8665fc963095?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .bg-login-form {
            background-color: var(--efectiva-blue);
            color: white;
        }
        .form-control, .form-select {
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .btn-dark-blue {
            background-color: #0b1142;
            color: white;
            border-radius: 25px;
            padding: 0.75rem;
        }
        .btn-dark-blue:hover {
            background-color: #000000;
            color: white;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row login-vh">
        <div class="col-md-6 d-none d-md-block bg-login-image">
            <div class="p-4 bg-white d-flex justify-content-between align-items-center" style="opacity: 0.95;">
                <span class="text-primary fw-bold fs-4">Σfectiva</span>
            </div>
        </div>

        <div class="col-md-6 bg-login-form d-flex flex-column justify-content-center align-items-center position-relative py-5">

            <div class="w-100" style="max-width: 400px;">
                <div class="text-center mb-3">
                    <div class="bg-white text-dark rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                        👤
                    </div>
                </div>

                <h3 class="text-center mb-4 fw-bold">Abre tu cuenta digital</h3>

                <form action="login.html" method="GET">
                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label class="form-label small">Tipo *</label>
                            <select class="form-select border-0 shadow-sm">
                                <option>DNI</option>
                                <option>CE</option>
                            </select>
                        </div>
                        <div class="col-md-7 mb-3">
                            <label class="form-label small">Nro. Documento *</label>
                            <input type="text" class="form-control border-0 shadow-sm" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">Nombres y Apellidos *</label>
                        <input type="text" class="form-control border-0 shadow-sm" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">Correo electrónico *</label>
                        <input type="email" class="form-control border-0 shadow-sm" placeholder="correo@ejemplo.com" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small">Crea una contraseña *</label>
                        <input type="password" class="form-control border-0 shadow-sm" placeholder="Mínimo 8 caracteres" required>
                    </div>

                    <button type="submit" class="btn btn-dark-blue w-100 fw-bold shadow-sm mb-3">
                        Crear cuenta
                    </button>
                </form>

                <div class="text-center mt-3 pt-3 border-top border-light">
                    <p class="small mb-2">¿Ya eres cliente?</p>
                    <a href="login.html" class="btn btn-outline-light rounded-pill px-4 btn-sm">Inicia sesión aquí</a>
                </div>
            </div>

        </div>
    </div>
</div>
<script>
    document.querySelector('button.btn-dark-blue').addEventListener('click', async (e) => {
        e.preventDefault();

        const selects = document.querySelectorAll('select');
        const inputs  = document.querySelectorAll('input');

        const datos = {
            tipoDocumento:   selects[0].value,
            numeroDocumento: inputs[0].value.trim(),
            nombres:         inputs[1].value.trim(),
            correo:          inputs[2].value.trim(),
            password:        inputs[3].value.trim()
        };

        if (!datos.numeroDocumento || !datos.nombres || !datos.correo || !datos.password) {
            alert('Por favor completa todos los campos.');
            return;
        }

        try {
            const response = await fetch('http://localhost:8080/api/usuarios/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            const result = await response.json();

            if (result.success) {
                alert('✅ Cuenta creada correctamente. Inicia sesión.');
                window.location.href = 'login.html';
            } else {
                alert('❌ Error: ' + result.message);
            }
        } catch (error) {
            alert('No se pudo conectar con el servidor.');
        }
    });
</script>
</body>
</html>

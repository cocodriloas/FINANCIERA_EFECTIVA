<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Financiera Efectiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* ESTILOS EXCLUSIVOS DEL REGISTRO (Iguales al Login) */
        .login-vh { min-height: 100vh; }
        .bg-login-image {
            background-image: url('https://images.unsplash.com/photo-1573164713988-8665fc963095?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .bg-login-form { background-color: var(--efectiva-blue); color: white; }
        .form-control, .form-select { padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.9rem; }
        .btn-dark-blue {
            background-color: var(--efectiva-dark-blue);
            color: white; border-radius: 25px; padding: 0.75rem; border: none; transition: all 0.2s;
        }
        .btn-dark-blue:hover { background-color: #000; color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row login-vh">
        <div class="col-md-6 d-none d-md-block bg-login-image">
            <div class="p-4 bg-white d-flex justify-content-between align-items-center" style="opacity: 0.95;">
                <span class="text-primary fw-bold fs-4">Σfectiva</span>
            </div>
        </div>

        <div class="col-md-6 bg-login-form d-flex flex-column justify-content-center align-items-center position-relative py-5">
            <div class="w-100" style="max-width: 400px;">
                <div class="text-center mb-3">
                    <div class="bg-white text-dark rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 50px; height: 50px; font-size: 1.4rem;">
                        👤
                    </div>
                </div>

                <h3 class="text-center mb-4 fw-bold">Abre tu cuenta digital</h3>

                <form id="form-registro">
                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label class="form-label small">Tipo *</label>
                            <select id="tipo-doc" class="form-select border-0 shadow-sm" required>
                                <option value="DNI">DNI</option>
                                <option value="CE">CE</option>
                            </select>
                        </div>
                        <div class="col-md-7 mb-3">
                            <label class="form-label small">Nro. Documento *</label>
                            <input type="text" id="num-doc" class="form-control border-0 shadow-sm" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">Nombres y Apellidos *</label>
                        <input type="text" id="nombres" class="form-control border-0 shadow-sm" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">Correo electrónico *</label>
                        <input type="email" id="correo" class="form-control border-0 shadow-sm" placeholder="correo@ejemplo.com" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small">Crea una contraseña *</label>
                        <input type="password" id="password" class="form-control border-0 shadow-sm" placeholder="Mínimo 8 caracteres" required>
                    </div>

                    <button type="submit" id="btn-registro" class="btn btn-dark-blue w-100 fw-bold shadow-sm mb-3">
                        Crear cuenta
                    </button>
                </form>

                <div class="text-center mt-3 pt-3 border-top border-light">
                    <p class="small mb-2">¿Ya eres cliente?</p>
                    <a href="login.html" class="btn btn-outline-light rounded-pill px-4 btn-sm">Inicia sesión aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('form-registro').addEventListener('submit', async (e) => {
        e.preventDefault();

        const tipoDocumento = document.getElementById('tipo-doc').value;
        const numeroDocumento = document.getElementById('num-doc').value.trim();
        const nombres = document.getElementById('nombres').value.trim();
        const correo = document.getElementById('correo').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn = document.getElementById('btn-registro');

        if (!numeroDocumento || !nombres || !correo || !password) {
            alert('Por favor completa todos los campos.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Procesando...';

        try {
            const response = await fetch('http://localhost:8080/api/usuarios/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tipoDocumento,
                    numeroDocumento,
                    nombres,
                    correo,
                    password
                })
            });

            const result = await response.json();

            if (result.success) {
                alert('✅ Cuenta creada correctamente. Inicia sesión.');
                window.location.href = 'login.html';
            } else {
                alert('❌ Error: ' + result.message);
            }
        } catch (error) {
            alert('No se pudo conectar con el servidor.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Crear cuenta';
        }
    });
</script>
</body>
</html>

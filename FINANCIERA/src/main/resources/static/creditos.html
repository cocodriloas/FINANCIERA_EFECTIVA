<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Créditos - Financiera Efectiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --efectiva-blue: #1a3fbf; }
        body { background: #f0f4ff; font-family: 'Inter', sans-serif; }
        .sidebar {
            background: var(--efectiva-blue); min-height: 100vh;
            width: 240px; position: fixed; top: 0; left: 0;
            padding: 2rem 1rem; color: white;
        }
        .sidebar .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; }
        .sidebar a {
            display: block; color: rgba(255,255,255,0.8);
            text-decoration: none; padding: 0.6rem 1rem;
            border-radius: 8px; margin-bottom: 0.3rem; font-size: 0.9rem;
        }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.15); color: white; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .card-solicitud { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border-left: 5px solid #ccc; }
        .card-solicitud.aprobado { border-left-color: #28a745; }
        .card-solicitud.pendiente { border-left-color: #ffc107; }
        .card-solicitud.revision { border-left-color: #17a2b8; }
        .card-solicitud.rechazado { border-left-color: #dc3545; }
        .badge-estado { padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .badge-aprobado { background: #d4edda; color: #155724; }
        .badge-pendiente { background: #fff3cd; color: #856404; }
        .badge-revision { background: #d1ecf1; color: #0c5460; }
        .badge-rechazado { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Σfectiva</div>
    <a href="dashboard.html">🏠 Inicio</a>
    <a href="ahorros.html">💰 Mis Ahorros</a>
    <a href="creditos.html" class="active">📋 Mis Créditos</a>
    <a href="solicitar_credito.html">➕ Solicitar Préstamo</a>
    <a href="transferencias.html">↔️ Transferencias</a>
    <a href="perfil.html">👤 Mi Perfil</a>
    <hr style="border-color:rgba(255,255,255,0.2); margin: 1rem 0;">
    <a href="login.html" id="btn-cerrar">🚪 Cerrar Sesión</a>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">📋 Mis Créditos y Solicitudes</h4>
        <a href="solicitar_credito.html" class="btn btn-sm fw-semibold"
           style="background:#1a3fbf; color:white; border-radius:8px">
            ➕ Nueva Solicitud
        </a>
    </div>

    <!-- Resumen -->
    <div class="row g-3 mb-4" id="resumen-cards">
        <div class="col-md-3">
            <div class="bg-white rounded-3 p-3 text-center">
                <div style="font-size:1.8rem">📄</div>
                <div class="fw-bold fs-4" id="total-solicitudes">-</div>
                <div class="text-muted small">Total solicitudes</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white rounded-3 p-3 text-center">
                <div style="font-size:1.8rem">✅</div>
                <div class="fw-bold fs-4" id="total-aprobados">-</div>
                <div class="text-muted small">Aprobados</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white rounded-3 p-3 text-center">
                <div style="font-size:1.8rem">⏳</div>
                <div class="fw-bold fs-4" id="total-pendientes">-</div>
                <div class="text-muted small">Pendientes</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white rounded-3 p-3 text-center">
                <div style="font-size:1.8rem">❌</div>
                <div class="fw-bold fs-4" id="total-rechazados">-</div>
                <div class="text-muted small">Rechazados</div>
            </div>
        </div>
    </div>

    <!-- Lista de solicitudes -->
    <div id="lista-solicitudes">
        <div class="text-center py-5 text-muted">
            <div style="font-size:2rem">⏳</div>
            <div>Cargando solicitudes...</div>
        </div>
    </div>
</div>

<script>
    const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
    if (!usuario || !usuario.id) window.location.href = 'login.html';

    document.getElementById('btn-cerrar').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('usuario');
        window.location.href = 'login.html';
    });

    function getBadgeClass(estado) {
        if (estado.includes('APROBADO')) return 'badge-aprobado';
        if (estado === 'PENDIENTE') return 'badge-pendiente';
        if (estado === 'EN_REVISION') return 'badge-revision';
        if (estado === 'RECHAZADO') return 'badge-rechazado';
        return 'badge-pendiente';
    }

    function getCardClass(estado) {
        if (estado.includes('APROBADO')) return 'aprobado';
        if (estado === 'PENDIENTE') return 'pendiente';
        if (estado === 'EN_REVISION') return 'revision';
        if (estado === 'RECHAZADO') return 'rechazado';
        return 'pendiente';
    }

    function getIconEstado(estado) {
        if (estado.includes('APROBADO')) return '🎉';
        if (estado === 'PENDIENTE') return '⏳';
        if (estado === 'EN_REVISION') return '🔍';
        if (estado === 'RECHAZADO') return '❌';
        return '📄';
    }

    async function cargarSolicitudes() {
        try {
            const response = await fetch(`http://localhost:8080/api/prestamos/usuario/${usuario.id}`);
            const result = await response.json();

            const lista = document.getElementById('lista-solicitudes');

            if (!result.success || result.solicitudes.length === 0) {
                lista.innerHTML = `
                    <div class="text-center py-5 text-muted bg-white rounded-3">
                        <div style="font-size:3rem">📭</div>
                        <div class="fw-semibold mt-2">No tienes solicitudes aún</div>
                        <div class="small mb-3">Solicita tu primer préstamo Efectivo</div>
                        <a href="solicitar_credito.html" class="btn btn-sm"
                           style="background:#1a3fbf; color:white; border-radius:8px">
                            Solicitar ahora
                        </a>
                    </div>`;
                document.getElementById('total-solicitudes').textContent = '0';
                document.getElementById('total-aprobados').textContent = '0';
                document.getElementById('total-pendientes').textContent = '0';
                document.getElementById('total-rechazados').textContent = '0';
                return;
            }

            const solicitudes = result.solicitudes;

            // Resumen
            document.getElementById('total-solicitudes').textContent = solicitudes.length;
            document.getElementById('total-aprobados').textContent =
                solicitudes.filter(s => s.estado.includes('APROBADO')).length;
            document.getElementById('total-pendientes').textContent =
                solicitudes.filter(s => s.estado === 'PENDIENTE' || s.estado === 'EN_REVISION').length;
            document.getElementById('total-rechazados').textContent =
                solicitudes.filter(s => s.estado === 'RECHAZADO').length;

            // Lista
            lista.innerHTML = solicitudes.map(s => {
                const fecha = new Date(s.fechaSolicitud).toLocaleDateString('es-PE', {
                    day:'2-digit', month:'long', year:'numeric'
                });
                return `
                <div class="card-solicitud ${getCardClass(s.estado)}">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="d-flex align-items-center gap-2 mb-1">
                                <span style="font-size:1.3rem">${getIconEstado(s.estado)}</span>
                                <strong>Préstamo de S/ ${parseFloat(s.monto).toLocaleString('es-PE', {minimumFractionDigits:2})}</strong>
                            </div>
                            <div class="text-muted small mb-2">📅 Solicitado: ${fecha}</div>
                            <div class="d-flex gap-3 small">
                                <span>⏱ <strong>${s.plazoMeses} meses</strong></span>
                                <span>💰 Cuota: <strong>S/ ${s.cuotaMensual ? parseFloat(s.cuotaMensual).toLocaleString('es-PE', {minimumFractionDigits:2}) : '--'}</strong></span>
                                <span>🎯 Scoring: <strong>${s.puntajeScoring || '--'}/100</strong></span>
                                ${s.proposito ? `<span>📌 ${s.proposito}</span>` : ''}
                            </div>
                        </div>
                        <span class="badge-estado ${getBadgeClass(s.estado)}">${s.estado.replace('_', ' ')}</span>
                    </div>
                </div>`;
            }).join('');

        } catch (error) {
            document.getElementById('lista-solicitudes').innerHTML =
                '<div class="alert alert-danger">Error conectando con el servidor.</div>';
        }
    }

    cargarSolicitudes();
</script>
</body>
</html>

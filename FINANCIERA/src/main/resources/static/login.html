<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Financiera Efectiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* ESTILOS EXCLUSIVOS DEL LOGIN (No borrar) */
        .login-vh { min-height: 100vh; }
        .bg-login-image {
            background-image: url('https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .bg-login-form { background-color: var(--efectiva-blue); color: white; }
        .form-control { padding: 0.8rem 1rem; border-radius: 8px; }
        .btn-dark-blue {
            background-color: var(--efectiva-dark-blue);
            color: white;
            border-radius: 25px;
            padding: 0.75rem;
            border: none;
            transition: all 0.2s;
        }
        .btn-dark-blue:hover { background-color: #000; color: white; }
        #mensaje-error {
            display: none;
            background: rgba(255,0,0,0.2);
            border: 1px solid rgba(255,80,80,0.6);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row login-vh">

        <div class="col-md-6 d-none d-md-block bg-login-image">
            <div class="p-4 bg-white d-flex justify-content-between align-items-center" style="opacity:0.95">
                <span class="text-primary fw-bold fs-4">Σfectiva</span>
                <div class="d-flex gap-4 fw-medium" style="font-size:0.9rem">
                    <a href="#" class="text-decoration-none text-dark">Consejos de seguridad</a>
                    <a href="#" class="text-decoration-none text-dark">FAQs</a>
                    <a href="#" class="text-decoration-none text-dark">Condiciones de uso</a>
                </div>
            </div>
        </div>

        <div class="col-md-6 bg-login-form d-flex flex-column justify-content-center align-items-center">
            <div class="w-100" style="max-width:400px; padding: 2rem;">

                <div class="text-center mb-4">
                    <div class="bg-white text-dark rounded-circle d-inline-flex align-items-center justify-content-center"
                         style="width:50px;height:50px;font-size:1.4rem">🔒</div>
                </div>

                <h3 class="text-center mb-4 fw-bold">Accede a la banca digital</h3>

                <div id="mensaje-error" class="mb-3">
                    ❌ <span id="texto-error"></span>
                </div>

                <div class="mb-3">
                    <label class="form-label small">Correo electrónico *</label>
                    <input type="email" id="correo"
                           class="form-control border-0 shadow-sm"
                           placeholder="correo@ejemplo.com">
                </div>

                <div class="mb-4">
                    <label class="form-label small">Contraseña *</label>
                    <input type="password" id="password"
                           class="form-control border-0 shadow-sm"
                           placeholder="Tu contraseña">
                </div>

                <button id="btn-login" class="btn btn-dark-blue w-100 fw-bold shadow-sm">
                    → Continuar
                </button>

                <div class="text-center mt-4">
                    <a href="#" class="text-white text-decoration-none small">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="text-center mt-5 pt-3 border-top border-light">
                    <p class="small mb-2">¿No tienes cuenta?</p>
                    <a href="registro.html" class="btn btn-outline-light rounded-pill px-4 btn-sm">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('btn-login').addEventListener('click', async () => {
        const correo   = document.getElementById('correo').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('mensaje-error');
        const errorTxt = document.getElementById('texto-error');

        errorDiv.style.display = 'none';

        if (!correo || !password) {
            errorTxt.textContent = 'Por favor completa todos los campos.';
            errorDiv.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('http://localhost:8080/api/usuarios/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, password })
            });

            const result = await response.json();

            if (result.success) {
                localStorage.setItem('usuario', JSON.stringify(result.data));
                localStorage.setItem('token', result.token);
                // AQUÍ ESTÁ LA MAGIA: El backend ahora nos dice a qué pantalla ir
                window.location.href = result.redirect;
            } else {
                errorTxt.textContent = result.message;
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorTxt.textContent = 'No se pudo conectar con el servidor.';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>

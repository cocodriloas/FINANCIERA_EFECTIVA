<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeja del Asesor - Financiera Efectiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

    <style>
        .card-solicitud {
            background: white; border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1rem;
            border-left: 5px solid #ccc;
            transition: box-shadow 0.2s;
        }
        .card-solicitud:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-solicitud.pendiente { border-left-color: #ffc107; }
        .card-solicitud.aprobado { border-left-color: #28a745; }
        .card-solicitud.revision { border-left-color: #17a2b8; }
        .card-solicitud.rechazado { border-left-color: #dc3545; }
        .card-solicitud.desembolsado { border-left-color: #007bff; }

        .badge-estado { padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .badge-pendiente { background: #fff3cd; color: #856404; }
        .badge-aprobado { background: #d4edda; color: #155724; }
        .badge-revision { background: #d1ecf1; color: #0c5460; }
        .badge-rechazado { background: #f8d7da; color: #721c24; }
        .badge-desembolsado { background: #cce5ff; color: #004085; }

        .scoring-bar { height: 6px; border-radius: 3px; background: #e9ecef; }
        .scoring-fill { height: 100%; border-radius: 3px; }

        .btn-aprobar { background: #28a745; color: white; border: none; border-radius: 8px; padding: 0.4rem 1rem; font-size: 0.85rem; }
        .btn-rechazar { background: #dc3545; color: white; border: none; border-radius: 8px; padding: 0.4rem 1rem; font-size: 0.85rem; }
        .btn-desembolsar { background: #007bff; color: white; border: none; border-radius: 8px; padding: 0.4rem 1rem; font-size: 0.85rem; }

        .btn-aprobar:hover { background: #218838; }
        .btn-rechazar:hover { background: #c82333; }
        .btn-desembolsar:hover { background: #0056b3; }

        .top-bar { background: white; border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; }
        .filtro-btn { border-radius: 20px; font-size: 0.85rem; padding: 0.3rem 1rem; }
        .filtro-btn.active { background: var(--efectiva-blue); color: white; border-color: var(--efectiva-blue); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Σfectiva</div>
    <div class="rol">🔐 Panel del Asesor</div>
    <a href="admin_bandeja.html" class="active">📋 Bandeja de Solicitudes</a>
    <a href="admin_reportes.html">📊 Reportes</a>
    <hr style="border-color:rgba(255,255,255,0.2); margin: 1rem 0;">
    <a href="login.html" id="btn-cerrar">🚪 Cerrar Sesión</a>
</div>

<div class="main-content">

    <div class="top-bar d-flex justify-content-between align-items-center">
        <div>
            <strong>Panel del Asesor</strong>
            <div class="text-muted small">Evalúa y gestiona las solicitudes de préstamo</div>
        </div>
        <button class="btn btn-sm" style="background:#1a3fbf; color:white; border-radius:8px"
                onclick="cargarSolicitudes()">
            🔄 Actualizar
        </button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="bg-white rounded-3 p-3 text-center">
                <div style="font-size:1.8rem">📄</div>
                <div class="fw-bold fs-4" id="cnt-total">-</div>
                <div class="text-muted small">Total</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white rounded-3 p-3 text-center">
                <div style="font-size:1.8rem">⏳</div>
                <div class="fw-bold fs-4" id="cnt-pendiente">-</div>
                <div class="text-muted small">Pendientes</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white rounded-3 p-3 text-center">
                <div style="font-size:1.8rem">✅</div>
                <div class="fw-bold fs-4" id="cnt-aprobado">-</div>
                <div class="text-muted small">Aprobados</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white rounded-3 p-3 text-center">
                <div style="font-size:1.8rem">💸</div>
                <div class="fw-bold fs-4" id="cnt-desembolsado">-</div>
                <div class="text-muted small">Desembolsados</div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-end mb-3 flex-wrap gap-3">
        <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-secondary filtro-btn active" onclick="filtrar('TODOS', this)">Todos</button>
            <button class="btn btn-outline-warning filtro-btn" onclick="filtrar('PENDIENTE', this)">⏳ Pendientes</button>
            <button class="btn btn-outline-info filtro-btn" onclick="filtrar('EN_REVISION', this)">🔍 En Revisión</button>
            <button class="btn btn-outline-success filtro-btn" onclick="filtrar('APROBADO', this)">✅ Aprobados</button>
            <button class="btn btn-outline-primary filtro-btn" onclick="filtrar('DESEMBOLSADO', this)">💸 Desembolsados</button>
            <button class="btn btn-outline-danger filtro-btn" onclick="filtrar('RECHAZADO', this)">❌ Rechazados</button>
        </div>

        <div class="d-flex align-items-center gap-2 bg-white p-2 rounded-3 shadow-sm border">
            <label class="small fw-bold text-muted mb-0 ms-1">📅 Buscar por fecha:</label>
            <input type="date" id="filtro-fecha" class="form-control form-control-sm border-0" style="background:#f8f9fa; outline:none; box-shadow:none;">
            <button class="btn btn-sm text-muted border-0" onclick="limpiarFecha()" title="Limpiar fecha">✖️</button>
        </div>
    </div>

    <div id="lista-solicitudes">
        <div class="text-center py-5 text-muted">
            <div style="font-size:2rem">⏳</div>
            <div>Cargando solicitudes...</div>
        </div>
    </div>
</div>

<script>
    let todasSolicitudes = [];
    let filtroActual = 'TODOS';
    let fechaFiltroActual = ''; // Variable para almacenar la fecha elegida

    // Preparación para JWT (Extrae el token del localStorage si existe)
    function getHeaders() {
        const token = localStorage.getItem('token');
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = 'Bearer ' + token;
        return headers;
    }

    // Escuchador para cuando el usuario cambia la fecha en el calendario
    document.getElementById('filtro-fecha').addEventListener('change', function(e) {
        fechaFiltroActual = e.target.value;
        aplicarFiltrosCombinados();
    });

    // Función para borrar la fecha seleccionada
    function limpiarFecha() {
        document.getElementById('filtro-fecha').value = '';
        fechaFiltroActual = '';
        aplicarFiltrosCombinados();
    }

    async function cargarSolicitudes() {
        try {
            const response = await fetch('/api/prestamos/todas', {
                headers: getHeaders()
            });
            const result = await response.json();

            if (result.success) {
                todasSolicitudes = result.solicitudes;
                actualizarContadores();
                aplicarFiltrosCombinados(); // Usamos el filtro combinado en lugar del render directo
            }
        } catch (error) {
            document.getElementById('lista-solicitudes').innerHTML =
                '<div class="alert alert-danger">Error conectando con el servidor.</div>';
        }
    }

    function actualizarContadores() {
        document.getElementById('cnt-total').textContent = todasSolicitudes.length;
        document.getElementById('cnt-pendiente').textContent =
            todasSolicitudes.filter(s => s.estado === 'PENDIENTE' || s.estado === 'EN_REVISION').length;
        document.getElementById('cnt-aprobado').textContent =
            todasSolicitudes.filter(s => s.estado === 'APROBADO' || s.estado === 'APROBADO_PROVISIONAL').length;
        document.getElementById('cnt-desembolsado').textContent =
            todasSolicitudes.filter(s => s.estado === 'DESEMBOLSADO').length;
    }

    // Lógica para capturar el botón de estado presionado
    function filtrar(estado, btn) {
        filtroActual = estado;
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        aplicarFiltrosCombinados();
    }

    // Lógica maestra que combina Estado + Fecha
    function aplicarFiltrosCombinados() {
        let filtradas = todasSolicitudes;

        // 1. Filtrar por Estado
        if (filtroActual !== 'TODOS') {
            filtradas = filtradas.filter(s => {
                if(filtroActual === 'APROBADO') return s.estado === 'APROBADO' || s.estado === 'APROBADO_PROVISIONAL';
                return s.estado === filtroActual;
            });
        }

        // 2. Filtrar por Fecha
        if (fechaFiltroActual) {
            filtradas = filtradas.filter(s => {
                if (!s.fechaSolicitud) return false;
                // Extraemos solo la porción YYYY-MM-DD de la fecha que llega del servidor
                const fechaCorta = s.fechaSolicitud.split('T')[0];
                return fechaCorta === fechaFiltroActual;
            });
        }

        renderLista(filtradas);
    }

    function getScoringColor(score) {
        if (score >= 70) return '#28a745';
        if (score >= 40) return '#ffc107';
        return '#dc3545';
    }

    function getCardClass(estado) {
        if (estado === 'DESEMBOLSADO') return 'desembolsado';
        if (estado.includes('APROBADO')) return 'aprobado';
        if (estado === 'PENDIENTE') return 'pendiente';
        if (estado === 'EN_REVISION') return 'revision';
        if (estado === 'RECHAZADO') return 'rechazado';
        return 'pendiente';
    }

    function getBadgeClass(estado) {
        if (estado === 'DESEMBOLSADO') return 'badge-desembolsado';
        if (estado.includes('APROBADO')) return 'badge-aprobado';
        if (estado === 'PENDIENTE') return 'badge-pendiente';
        if (estado === 'EN_REVISION') return 'badge-revision';
        if (estado === 'RECHAZADO') return 'badge-rechazado';
        return 'badge-pendiente';
    }

    function renderLista(solicitudes) {
        const lista = document.getElementById('lista-solicitudes');
        if (solicitudes.length === 0) {
            lista.innerHTML = `
                <div class="text-center py-5 bg-white rounded-3 text-muted">
                    <div style="font-size:2.5rem">📭</div>
                    <div class="fw-semibold mt-2">No hay solicitudes para este filtro</div>
                </div>`;
            return;
        }

        lista.innerHTML = solicitudes.map(s => {
            const fecha = new Date(s.fechaSolicitud).toLocaleDateString('es-PE', {
                day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
            });
            const scoring = s.puntajeScoring || 0;
            const colorScoring = getScoringColor(scoring);

            // Lógicas de visibilidad de botones
            const esPendiente = s.estado === 'PENDIENTE' || s.estado === 'EN_REVISION' || s.estado === 'APROBADO_PROVISIONAL';
            const esAprobadoParaDesembolso = s.estado === 'APROBADO' || s.estado === 'APROBADO_PROVISIONAL';

            return `
            <div class="card-solicitud ${getCardClass(s.estado)}" id="card-${s.id}">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <strong class="fs-5">S/ ${parseFloat(s.monto).toLocaleString('es-PE', {minimumFractionDigits:2})}</strong>
                            <span class="badge-estado ${getBadgeClass(s.estado)}">${s.estado.replace(/_/g,' ')}</span>
                            ${s.proposito ? `<span class="text-muted small">📌 ${s.proposito}</span>` : ''}
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-auto small text-muted">⏱ <strong>${s.plazoMeses} meses</strong></div>
                            <div class="col-auto small text-muted">💰 Cuota: <strong>S/ ${s.cuotaMensual ? parseFloat(s.cuotaMensual).toFixed(2) : '--'}</strong></div>
                            <div class="col-auto small text-muted">📅 ${fecha}</div>
                            ${s.evaluadoPor ? `<div class="col-auto small text-muted">👤 Evaluado por: <strong>${s.evaluadoPor}</strong></div>` : ''}
                        </div>

                        <div class="d-flex align-items-center gap-2">
                            <span class="small text-muted">Scoring:</span>
                            <div class="scoring-bar flex-grow-1" style="max-width:150px">
                                <div class="scoring-fill" style="width:${scoring}%; background:${colorScoring}"></div>
                            </div>
                            <span class="small fw-bold" style="color:${colorScoring}">${scoring}/100</span>
                        </div>
                    </div>

                    <div class="d-flex flex-column gap-2 ms-3">
                        ${esPendiente ? `
                        <button class="btn-aprobar" onclick="evaluarSolicitud('${s.id}', 'APROBADO')">
                            ✅ Aprobar
                        </button>
                        <button class="btn-rechazar" onclick="evaluarSolicitud('${s.id}', 'RECHAZADO')">
                            ❌ Rechazar
                        </button>
                        ` : ''}

                        ${esAprobadoParaDesembolso ? `
                        <button class="btn-desembolsar" onclick="evaluarSolicitud('${s.id}', 'DESEMBOLSADO')">
                            💸 Desembolsar
                        </button>
                        ` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function evaluarSolicitud(id, nuevoEstado) {
        let accion = 'evaluar';
        if(nuevoEstado === 'APROBADO') accion = 'aprobar';
        if(nuevoEstado === 'RECHAZADO') accion = 'rechazar';
        if(nuevoEstado === 'DESEMBOLSADO') accion = 'desembolsar';

        if (!confirm(`¿Estás seguro de ${accion} esta solicitud?`)) return;

        try {
            const response = await fetch(`http://localhost:8080/api/prestamos/${id}/evaluar`, {
                method: 'PUT',
                headers: getHeaders(),
                body: JSON.stringify({
                    estado: nuevoEstado,
                    evaluadoPor: 'Asesor Financiero'
                })
            });

            const result = await response.json();
            if (result.success) {
                const idx = todasSolicitudes.findIndex(s => s.id === id);
                if (idx !== -1) {
                    todasSolicitudes[idx].estado = nuevoEstado;
                    todasSolicitudes[idx].evaluadoPor = 'Asesor Financiero';
                }
                actualizarContadores();
                aplicarFiltrosCombinados(); // Actualiza la lista respetando estado y fecha
            } else {
                alert('No se pudo procesar: ' + result.message);
            }
        } catch (error) {
            alert('Error de conexión con el servidor.');
        }
    }

    document.getElementById('btn-cerrar').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('usuario');
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    });

    cargarSolicitudes();
</script>
</body>
</html>
